<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Credential Relay</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Credential Relay</h1>
      <div id="status" class="status disconnected">
        <span class="dot"></span>
        <span id="status-text">Checking...</span>
      </div>
    </header>

    <!-- Step 1: Page info + login detection -->
    <section id="page-info" class="section">
      <div id="no-login" class="message">
        <p>No login form detected on this page.</p>
      </div>
      <div id="login-detected" class="message hidden">
        <p>Login form detected!</p>
        <p class="domain" id="page-domain"></p>
      </div>
    </section>

    <!-- Step 2: Select credential to request -->
    <section id="credential-select" class="section hidden">
      <label>Select credential:</label>
      <select id="credential-list">
        <option value="">Loading...</option>
      </select>
      <label>Select device:</label>
      <select id="device-list">
        <option value="">Loading...</option>
      </select>
      <button id="request-btn" class="btn primary" disabled>Request Credential</button>
    </section>

    <!-- Step 3: Waiting for approval + auto-inject -->
    <section id="waiting" class="section hidden">
      <div class="spinner"></div>
      <p id="waiting-status">Waiting for admin approval...</p>
      <p class="request-id" id="waiting-request-id"></p>
    </section>

    <!-- Result -->
    <section id="result" class="section hidden">
      <p id="result-message"></p>
    </section>
  </div>

  <script src="popup.js"></script>
</body>
</html>
